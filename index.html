<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Guide Club Scolaire</title>
  <meta name="description" content="Guide Club Scolaire — دليل مرجعي شامل للأندية التربوية، مستخرَج من دليل الحياة المدرسية 2019، وزارة التربية الوطنية المغربية">
  <meta name="theme-color" content="#2d6a4f">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Arabic:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="manifest" href="manifest.json">
  <link rel="stylesheet" href="css/main.css?v=3">
</head>
<body>

<div id="app">

  <!-- Top bar -->
  <header class="top-bar">
    <span class="top-bar-title" id="top-bar-title">Guide Club Scolaire</span>
    <span id="app-version" style="font-size:.65rem; opacity:.6; margin-inline-start:auto; padding-inline-end:.5rem; white-space:nowrap;">v0.8</span>
    <button class="btn-search-top" onclick="openSearch()" aria-label="بحث">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
    </button>
    <button id="btn-install" class="btn-install" onclick="installApp()">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M12 3v13M5 14l7 7 7-7"/><path d="M3 21h18"/></svg>
      <span>تثبيت التطبيق</span>
    </button>
  </header>

  <!-- Main content -->
  <main>
    <section id="section-home"    class="section"></section>
    <section id="section-concept" class="section"></section>
    <section id="section-parcours"class="section"></section>
    <section id="section-fiches"  class="section"></section>
    <section id="section-legal"   class="section"></section>
  </main>

  <!-- Bottom navigation -->
  <nav class="bottom-nav">
    <button class="nav-item" data-section="home">
      <span class="nav-icon">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
      </span>
      <span>الرئيسية</span>
    </button>
    <button class="nav-item" data-section="concept">
      <span class="nav-icon">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/></svg>
      </span>
      <span>المفهوم</span>
    </button>
    <button class="nav-item" data-section="parcours">
      <span class="nav-icon">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><circle cx="3" cy="6" r="1" fill="currentColor"/><circle cx="3" cy="12" r="1" fill="currentColor"/><circle cx="3" cy="18" r="1" fill="currentColor"/></svg>
      </span>
      <span>المسار</span>
    </button>
    <button class="nav-item" data-section="fiches">
      <span class="nav-icon">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="5" width="20" height="14" rx="2"/><line x1="2" y1="10" x2="22" y2="10"/><line x1="8" y1="15" x2="13" y2="15"/></svg>
      </span>
      <span>البطاقات</span>
    </button>
    <button class="nav-item" data-section="legal">
      <span class="nav-icon">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2L2 7l10 5 10-5-10-5z"/><path d="M2 17l10 5 10-5M2 12l10 5 10-5"/></svg>
      </span>
      <span>القانون</span>
    </button>
  </nav>

</div><!-- /#app -->

<!-- Fiche modal — global, not inside any section -->
<div class="modal-overlay" id="fiche-modal" onclick="closeFicheModal(event)">
  <div class="modal" onclick="event.stopPropagation()">
    <div class="modal-top no-print">
      <span class="modal-title" id="modal-title"></span>
      <button class="modal-close" onclick="closeFicheModal()">✕</button>
    </div>
    <div class="modal-actions no-print">
      <a class="btn btn-docx" id="modal-docx-btn" href="#" download>📝 تحميل DOCX</a>
      <a class="btn btn-pdf" id="modal-pdf-btn" href="#" target="_blank">📥 PDF الرسمي</a>
    </div>
    <div class="modal-content" id="modal-body"></div>
  </div>
</div>

<!-- Dedicated print area (hidden on screen, shown when printing) -->
<div id="print-area"></div>

<!-- Facilitator mode (full-screen overlay) -->
<div id="facilitator-mode">
  <div class="facilitator-top">
    <span class="facilitator-top-title">🎯 وضع المُيسِّر — محاكاة صفية</span>
    <button class="btn-exit-facilitator" id="btn-exit-facilitator">✕ الخروج</button>
  </div>
  <div class="facilitator-content" id="facilitator-content">
    <div id="facilitator-slides"></div>
  </div>
  <div class="facilitator-footer">
    <button class="btn-nav btn-nav-prev" id="btn-prev" disabled>→ السابق</button>
    <span class="step-counter" id="slide-counter">1 / 10</span>
    <button class="btn-nav btn-nav-next" id="btn-next">التالي ←</button>
  </div>
</div>

<!-- Search overlay -->
<div class="search-overlay" id="search-overlay">
  <div class="search-box">
    <div class="search-input-row">
      <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" style="flex-shrink:0; opacity:.5;"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
      <input type="search" id="search-input" placeholder="ابحث في البطاقات، المسار، القانون…" autocomplete="off" autocorrect="off" spellcheck="false">
      <button class="search-close-btn" onclick="closeSearch()">✕</button>
    </div>
    <div id="search-results"></div>
  </div>
</div>

<!-- Data files -->
<script src="js/data/legal.js"></script>
<script src="js/data/fiches.js"></script>
<script src="js/data/parcours.js"></script>

<!-- App -->
<script src="js/main.js"></script>

</body>
</html>
